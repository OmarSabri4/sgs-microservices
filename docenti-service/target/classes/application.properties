server.port=8081
spring.application.name=docenti-service

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5433/sgs
spring.datasource.username=sgs_user
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=sgs_core

# Logging
logging.level.com.sgs=DEBUG

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
